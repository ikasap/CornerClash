    <rect x="-82" y="-82" width="164" height="164" rx="42" transform="rotate(45)" fill="url(#center-core)" stroke="#fff7d6" stroke-width="14"/>
    <path d="M-24 -54H22C54 -54 72 -38 72 -10C72 18 52 40 18 40H-10V72H-48V-54H-24ZM-10 -24V10H18C28 10 34 4 34 -7C34 -18 28 -24 18 -24H-10Z" fill="#09172a"/>
