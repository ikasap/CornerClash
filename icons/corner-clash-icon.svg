    <circle cx="238" cy="238" r="54" fill="#d1fae5" opacity="0.92"/>
    <circle cx="786" cy="238" r="76" fill="#14b8a6"/>
    <circle cx="786" cy="238" r="54" fill="#ccfbf1" opacity="0.92"/>
    <circle cx="238" cy="786" r="76" fill="#3b82f6"/>
    <circle cx="238" cy="786" r="54" fill="#dbeafe" opacity="0.92"/>
    <circle cx="786" cy="786" r="76" fill="#fb923c"/>
    <circle cx="786" cy="786" r="54" fill="#ffedd5" opacity="0.92"/>
